<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="610" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Five canonical agent workflow patterns</title>
  <desc id="desc">Minimal node-line diagrams for prompt chaining, routing, parallelization, orchestrator-workers, and evaluator-optimizer.</desc>
  <defs>
    <style>
      .title { font: 800 34px Inter, Arial, sans-serif; fill: #464646; }
      .pattern { font: 800 24px Inter, Arial, sans-serif; fill: #4f86e8; }
      .line { stroke: #b9cef4; stroke-width: 6; stroke-linecap: round; fill: none; }
      .node { fill: #ffffff; stroke: #4f86e8; stroke-width: 7; }
      .dot { fill: #6f99e6; opacity: .85; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="600" y="54" text-anchor="middle" class="title">5 Canonical Agent Workflow Patterns</text>

  <g transform="translate(80 115)">
    <line x1="20" y1="55" x2="320" y2="55" class="line" />
    <circle cx="20" cy="55" r="25" class="node" />
    <circle cx="170" cy="55" r="25" class="node" />
    <circle cx="320" cy="55" r="25" class="node" />
    <circle cx="220" cy="55" r="15" class="dot" />
    <text x="170" y="145" text-anchor="middle" class="pattern">Prompt Chaining</text>
  </g>

  <g transform="translate(455 115)">
    <line x1="30" y1="55" x2="290" y2="15" class="line" />
    <line x1="30" y1="55" x2="290" y2="55" class="line" />
    <line x1="30" y1="55" x2="290" y2="95" class="line" />
    <circle cx="30" cy="55" r="25" class="node" />
    <circle cx="290" cy="15" r="25" class="node" />
    <circle cx="290" cy="55" r="25" class="node" />
    <circle cx="290" cy="95" r="25" class="node" />
    <circle cx="160" cy="35" r="15" class="dot" />
    <circle cx="160" cy="55" r="15" class="dot" />
    <text x="160" y="145" text-anchor="middle" class="pattern">Routing</text>
  </g>

  <g transform="translate(850 115)">
    <line x1="30" y1="55" x2="160" y2="15" class="line" />
    <line x1="30" y1="55" x2="160" y2="55" class="line" />
    <line x1="30" y1="55" x2="160" y2="95" class="line" />
    <line x1="160" y1="15" x2="310" y2="55" class="line" />
    <line x1="160" y1="55" x2="310" y2="55" class="line" />
    <line x1="160" y1="95" x2="310" y2="55" class="line" />
    <circle cx="30" cy="55" r="25" class="node" />
    <circle cx="160" cy="15" r="25" class="node" />
    <circle cx="160" cy="55" r="25" class="node" />
    <circle cx="160" cy="95" r="25" class="node" />
    <circle cx="310" cy="55" r="25" class="node" />
    <circle cx="55" cy="55" r="15" class="dot" />
    <text x="170" y="145" text-anchor="middle" class="pattern">Parallelization</text>
  </g>

  <g transform="translate(240 330)">
    <line x1="35" y1="25" x2="165" y2="95" class="line" />
    <line x1="165" y1="95" x2="295" y2="25" class="line" />
    <line x1="165" y1="95" x2="165" y2="170" class="line" />
    <circle cx="35" cy="25" r="25" class="node" />
    <circle cx="165" cy="95" r="25" class="node" />
    <circle cx="295" cy="25" r="25" class="node" />
    <circle cx="165" cy="170" r="25" class="node" />
    <circle cx="115" cy="65" r="15" class="dot" />
    <circle cx="215" cy="65" r="15" class="dot" />
    <text x="165" y="230" text-anchor="middle" class="pattern">Orch-Workers</text>
  </g>

  <g transform="translate(720 365)">
    <line x1="35" y1="60" x2="250" y2="60" class="line" />
    <path d="M78 60 C105 122 180 122 207 60" class="line" />
    <circle cx="35" cy="60" r="25" class="node" />
    <circle cx="250" cy="60" r="25" class="node" />
    <circle cx="70" cy="60" r="15" class="dot" />
    <text x="145" y="155" text-anchor="middle" class="pattern">Eval-Optimizer</text>
  </g>
</svg>
